<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial}

/* BOTÃO PEQUENO */
#openBtn{
position:fixed;
bottom:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
z-index:9999;
}

/* JANELA */
#box{
position:fixed;
bottom:70px;
right:15px;
width:280px;
height:340px;
background:#0a0a0a;
border:1px solid #222;
border-radius:12px;
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
}

#top{
background:#111;
color:#fff;
padding:8px;
display:flex;
justify-content:space-between;
font-size:13px;
}

#msgs{
flex:1;
padding:6px;
overflow:auto;
font-size:12px;
color:white;
}

.msg{margin:5px 0}
.bot{color:#fff}
.user{color:#2d7cff}

#inputArea{
display:flex;
padding:6px;
background:#111;
}

input{
flex:1;
border:none;
padding:6px;
outline:none;
font-size:12px;
border-radius:6px;
}

button{
background:#2d7cff;
border:none;
color:white;
padding:6px 10px;
margin-left:5px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

</style>
</head>

<body>

<!-- BOTÃO -->
<div id="openBtn">💬</div>

<!-- CHAT -->
<div id="box">

<div id="top">
CosmoBot
<span onclick="box.style.display='none'">✖</span>
</div>

<div id="msgs">
<div class="msg bot">Oi 👋</div>
</div>

<div id="inputArea">
<input id="txt" placeholder="Pergunte...">
<button onclick="send()">➤</button>
</div>

</div>

<script>

let btn=document.getElementById("openBtn");
let box=document.getElementById("box");
let msgs=document.getElementById("msgs");
let txt=document.getElementById("txt");

btn.onclick=()=>{
box.style.display="flex";
}

function add(t,c){
msgs.innerHTML+=`<div class="msg ${c}">${t}</div>`;
msgs.scrollTop=msgs.scrollHeight;
}

function send(){
let v=txt.value.trim();
if(!v)return;

add(v,"user");
txt.value="";

setTimeout(()=>{
add(bot(v.toLowerCase()),"bot");
},300);
}

function bot(m){

if(m.includes("oi")) return "Oi 👋";
if(m.includes("terra")) return "🌍 Terra";
if(m.includes("lua")) return "🌕 Lua";
if(m.includes("sol")) return "☀️ Sol";
if(m.includes("marte")) return "🔴 Marte";
if(m.includes("jupiter")) return "🪐 Júpiter";

return "🤔 Não sei isso ainda";
}

</script>

</body>
</html>
