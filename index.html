<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#000}

/* BOTÃO */
#btn{
position:fixed;
bottom:15px;
right:15px;
background:#111;
color:#fff;
padding:10px 14px;
border-radius:25px;
cursor:pointer;
font-size:14px;
z-index:9999;
}

/* CHAT MENOR */
#chat{
position:fixed;
bottom:70px;
right:15px;
width:260px;
height:360px;
background:#0a0a0a;
border:1px solid #222;
border-radius:12px;
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
}

#top{
background:#111;
color:#fff;
padding:8px;
font-size:13px;
display:flex;
justify-content:space-between;
}

/* MENSAGENS MENOR */
#msgs{
flex:1;
padding:6px;
overflow:auto;
font-size:12px;
}

.msg{
margin:5px 0;
padding:6px;
border-radius:8px;
max-width:85%;
}

.user{background:#2d7cff;color:#fff;margin-left:auto}
.bot{background:#1f1f1f;color:#fff}

/* INPUT MENOR */
#inputArea{
display:flex;
padding:6px;
background:#111;
}

input{
flex:1;
padding:6px;
border:none;
outline:none;
font-size:12px;
border-radius:6px;
}

button{
background:#2d7cff;
border:none;
color:#fff;
padding:6px 10px;
margin-left:5px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

/* MOBILE AJUSTADO */
@media(max-width:600px){
#chat{
width:90%;
right:5%;
height:70vh;
}
}

</style>
</head>

<body>

<div id="btn">💬 Bot</div>

<div id="chat">

<div id="top">
CosmoBot
<span onclick="chat.style.display='none'">✖</span>
</div>

<div id="msgs">
<div class="msg bot">Oi 👋</div>
</div>

<div id="inputArea">
<input id="txt" placeholder="Pergunte...">
<button onclick="send()">➤</button>
</div>

</div>

<script>

let btn=document.getElementById("btn");
let chat=document.getElementById("chat");
let msgs=document.getElementById("msgs");
let txt=document.getElementById("txt");

btn.onclick=()=>chat.style.display="flex";

function add(t,c){
msgs.innerHTML+=`<div class="msg ${c}">${t}</div>`;
msgs.scrollTop=msgs.scrollHeight;
}

function send(){
let v=txt.value.trim();
if(!v)return;

add(v,"user");
txt.value="";

setTimeout(()=>{
add(bot(v.toLowerCase()),"bot");
},300);
}

function bot(m){

if(m.includes("oi")) return "Oi 👋";
if(m.includes("terra")) return "🌍 Terra";
if(m.includes("lua")) return "🌕 Lua";
if(m.includes("sol")) return "☀️ Sol";
if(m.includes("marte")) return "🔴 Marte";
if(m.includes("jupiter")) return "🪐 Júpiter";

return "🤔 Não entendi";
}

</script>

</body>
</html>
