<div style="background:black;color:white;padding:22px;border-radius:16px;max-width:600px;margin:auto;font-family:Arial;">

<div style="font-size:26px;text-align:center;margin-bottom:10px;">
🤖 CosmoBot Lunar
</div>

<input id="msg" placeholder="Pergunte: lua, marte, universo..."
style="width:100%;padding:12px;border:none;border-radius:10px;text-align:center;font-size:16px;">

<br><br>

<button onclick="ask()"
style="width:100%;padding:10px;border:none;border-radius:10px;cursor:pointer;">
Perguntar
</button>

<div id="res" style="margin-top:20px;"></div>

</div>

<script>

function moonData(){

const SYNODIC = 29.530588853;
const BASE = new Date(Date.UTC(2000,0,6,18,14,0));

let now = new Date();
let days = (now - BASE) / 86400000;

let phase = days % SYNODIC;
if(phase < 0) phase += SYNODIC;

let illumination = (1 - Math.cos(2 * Math.PI * phase / SYNODIC)) / 2;
let percent = Math.round(illumination * 100);

let name = "";

if(percent < 5) name = "Lua Nova 🌑";
else if(percent < 45) name = "Crescente 🌒";
else if(percent < 55) name = "Lua Cheia 🌕";
else if(percent < 95) name = "Minguante 🌖";
else name = "Lua Nova 🌑";

return {percent, name};
}

function ask(){

let q = document.getElementById("msg").value.toLowerCase();
let m = moonData();

let res = "";

if(q.includes("lua")){

res = `
🌕 <b>Lua agora:</b><br>
Fase: ${m.name}<br>
Iluminação: ${m.percent}%
`;

}
else if(q.includes("marte")){
res = "🔴 Marte é o planeta vermelho do sistema solar.";
}
else if(q.includes("jupiter")){
res = "🪐 Júpiter é o maior planeta do sistema solar.";
}
else{
res = "🤖 Não entendi. Tente: lua, marte, jupiter";
}

document.getElementById("res").innerHTML = res;
}

</script>
