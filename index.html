<div style="background:black;color:white;padding:22px;border-radius:16px;max-width:600px;margin:auto;font-family:Arial;">

<div style="font-size:26px;margin-bottom:10px;text-align:center;">
🤖 CosmoBot
</div>

<div style="text-align:center;color:#aaa;margin-bottom:10px;">
Pergunte qualquer coisa do universo 🌍🪐
</div>

<input id="msg" placeholder="Digite sua pergunta..."
style="width:100%;padding:12px;border:none;border-radius:10px;text-align:center;font-size:16px;">

<br><br>

<button onclick="askBot()"
style="padding:10px 18px;border:none;border-radius:10px;cursor:pointer;width:100%;">
Perguntar
</button>

<div id="res" style="margin-top:20px;text-align:left;"></div>

</div>

<script>
async function askBot(){

let q = document.getElementById("msg").value;
if(!q) return;

document.getElementById("res").innerHTML = "🤖 pensando no cosmos...";

try{

// 🌍 Wikipedia
let wiki = fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(q))
.then(r => r.json())
.catch(() => null);

// 🔎 DuckDuckGo
let ddg = fetch("https://api.duckduckgo.com/?q=" + encodeURIComponent(q) + "&format=json&no_redirect=1&no_html=1")
.then(r => r.json())
.catch(() => null);

let [w, d] = await Promise.all([wiki, ddg]);

let reply = "";

if(w && w.extract){
reply += `
<div style="padding:10px;border:1px solid #333;border-radius:10px;margin-bottom:10px;">
<div style="color:cyan;">📘 Wikipedia</div>
<div style="margin-top:5px;">${w.extract}</div>
</div>`;
}

if(d && d.AbstractText){
reply += `
<div style="padding:10px;border:1px solid #333;border-radius:10px;">
<div style="color:cyan;">🔎 Internet</div>
<div style="margin-top:5px;">${d.AbstractText}</div>
</div>`;
}

if(!reply){
reply = "❌ Não encontrei nada claro sobre isso no cosmos.";
}

document.getElementById("res").innerHTML = reply;

}catch(e){
document.getElementById("res").innerHTML = "Erro no CosmoBot ❌";
}

}
</script>
