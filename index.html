<div style="background:black;color:white;padding:22px;border-radius:16px;max-width:500px;margin:auto;font-family:Arial;text-align:center;">

<div style="font-size:26px;margin-bottom:10px;">
🔎 CosmoNex Search
</div>

<input id="q" placeholder="Pesquisar no universo da web..."
style="width:100%;padding:12px;border:none;border-radius:10px;text-align:center;font-size:16px;">

<br><br>

<button onclick="search()"
style="padding:10px 18px;border:none;border-radius:10px;cursor:pointer;">
Buscar
</button>

<div id="res" style="margin-top:20px;text-align:left;"></div>

</div>

<script>
async function search(){

let q = document.getElementById("q").value;

if(!q) return;

// API pública (DuckDuckGo instant answer)
let url = "https://api.duckduckgo.com/?q=" + encodeURIComponent(q) + "&format=json&no_redirect=1&no_html=1";

try{

let res = await fetch(url);
let data = await res.json();

let text = data.AbstractText || "Nenhum resultado direto encontrado.";

let link = data.AbstractURL || "";

document.getElementById("res").innerHTML =
"<div style='color:#ccc;font-size:14px;'>Resultado:</div>" +
"<div style='margin-top:10px;font-size:16px;'>" + text + "</div>" +
(link ? "<br><a href='"+link+"' target='_blank' style='color:cyan;'>Abrir fonte</a>" : "");

}catch(e){
document.getElementById("res").innerHTML =
"Erro na busca ❌";
}

}
</script>
