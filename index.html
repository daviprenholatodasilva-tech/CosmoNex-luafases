<div style="background:black;color:white;padding:22px;border-radius:16px;max-width:380px;margin:auto;font-family:Arial;text-align:center;">

<div style="font-size:26px;margin-bottom:10px;">
🌕 Fase da Lua
</div>

<div id="moon" style="font-size:70px;">🌑</div>

<div id="phase" style="font-size:20px;margin-top:10px;"></div>

<div id="percent" style="margin-top:10px;font-size:18px;color:#ccc;"></div>

</div>

<script>
function moonPhase(){

// ciclo lunar real
const SYNODIC = 29.530588853;

// referência fixa (Lua nova conhecida)
const BASE = new Date(Date.UTC(2000,0,6,18,14,0));

// dias desde a referência
let now = new Date();
let days = (now - BASE) / 86400000;

// posição no ciclo
let phase = days % SYNODIC;
if(phase < 0) phase += SYNODIC;

// iluminação (0 a 1)
let illumination = (1 - Math.cos(2 * Math.PI * phase / SYNODIC)) / 2;

let percent = Math.round(illumination * 100);

// nomes simples e estáveis
let name = "";

if(percent < 5) name = "Lua Nova 🌑";
else if(percent < 45) name = "Crescente 🌒";
else if(percent < 55) name = "Lua Cheia 🌕";
else if(percent < 95) name = "Minguante 🌖";
else name = "Lua Nova 🌑";

// emoji
let emoji = illumination < 0.5 ? "🌒" : "🌕";

document.getElementById("moon").innerHTML = emoji;
document.getElementById("phase").innerHTML = name;
document.getElementById("percent").innerHTML =
"Iluminação: " + percent + "%";
}

moonPhase();
setInterval(moonPhase, 300000);
</script>
